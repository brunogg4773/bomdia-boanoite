<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boa Noite 🌸</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: #1a0010;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    .wrap {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      background: #1a0010;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .petals-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .petal {
      position: absolute;
      border-radius: 50% 0 50% 0;
      opacity: 0.12;
      animation: fallingPetal linear infinite;
    }

    @keyframes fallingPetal {
      0%   { transform: translateY(-40px) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.15; }
      90%  { opacity: 0.1; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    .bubble {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 150, 200, 0.06);
      border: 1px solid rgba(255, 150, 200, 0.12);
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50%      { transform: scale(1.08); opacity: 0.9; }
    }

    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1.25rem;
      position: relative;
      z-index: 2;
      min-height: 100vh;
      justify-content: center;
      width: 100%;
    }

    .screen.active { display: flex; }

    .ribbon {
      background: linear-gradient(135deg, #ff6eb0, #ff3d8b);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 5px 18px;
      border-radius: 20px;
      margin-bottom: 1rem;
      animation: popIn .5s cubic-bezier(.34, 1.56, .64, 1);
    }

    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .big-emoji {
      font-size: 64px;
      animation: bounce 2.5s ease-in-out infinite;
      margin-bottom: .4rem;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0) rotate(-3deg); }
      50%      { transform: translateY(-12px) rotate(3deg); }
    }

    .h1 {
      font-size: 26px;
      font-weight: 700;
      color: #ffd6ec;
      text-align: center;
      margin-bottom: .3rem;
      line-height: 1.2;
    }

    .sub {
      font-size: 13px;
      color: #e8a0c8;
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 130, 190, 0.2);
      border-radius: 22px;
      padding: 1.5rem 1.25rem;
      width: 100%;
      max-width: 320px;
    }

    .lbl {
      font-size: 12px;
      color: #d490b8;
      margin-bottom: 5px;
      display: block;
      font-weight: 600;
    }

    .inp {
      width: 100%;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 130, 190, 0.25);
      border-radius: 14px;
      padding: 12px 14px;
      color: #ffd6ec;
      font-size: 14px;
      outline: none;
      margin-bottom: 14px;
      transition: border .2s, background .2s;
    }

    .inp:focus {
      border-color: rgba(255, 100, 170, 0.7);
      background: rgba(255, 255, 255, 0.11);
    }

    .inp::placeholder { color: rgba(220, 140, 180, 0.35); }

    .btn-enter {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #ff3d8b, #ff6eb0);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }

    .btn-enter:hover  { opacity: .92; }
    .btn-enter:active { transform: scale(.97); }

    .err {
      font-size: 12px;
      color: #ff8ab0;
      text-align: center;
      min-height: 16px;
      margin-top: 10px;
    }

    .artist-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 340px;
    }

    .acard {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 130, 190, 0.18);
      border-radius: 18px;
      padding: 13px 16px;
      cursor: pointer;
      transition: background .2s, border .2s, transform .15s;
    }

    .acard:hover  { border-color: rgba(255, 80, 160, 0.5); transform: translateX(5px); }
    .acard:active { transform: scale(.98); }

    .acard-emoji {
      font-size: 28px;
      width: 46px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 80, 160, 0.12);
      border-radius: 13px;
      flex-shrink: 0;
    }

    .acard-info  { flex: 1; }
    .acard-name  { font-size: 15px; font-weight: 700; color: #ffd6ec; margin-bottom: 2px; }
    .acard-song  { font-size: 12px; color: #d490b8; }
    .acard-arrow { color: #ff6eb0; font-size: 16px; opacity: .6; }

    .disc-wrap {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: rgba(255, 80, 160, 0.18);
      border: 2px solid rgba(255, 130, 190, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 54px;
      margin-bottom: 1rem;
      animation: spinDisc 7s linear infinite;
      animation-play-state: paused;
      position: relative;
    }

    .disc-wrap::after {
      content: '';
      width: 20px;
